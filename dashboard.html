<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — LibraSys</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Libra<span>Sys</span></div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1>Welcome, <span id="userName">User</span></h1>
      <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="spinner-container"><div class="spinner"></div></div>
    </div>

    <div id="adminPanel" style="display:none;">
      <div class="admin-section">
        <h2>Admin Panel</h2>
        <div class="admin-links">
          <a href="admin-books.html" class="btn btn-primary">Manage Books</a>
          <a href="add-book.html" class="btn btn-secondary">Add New Book</a>
        </div>
      </div>
    </div>

    <div class="recent-borrows">
      <h2>Recent Borrows</h2>
      <div id="recentBorrows">
        <div class="spinner-container"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 LibraSys. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
