<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — LibraSys</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Libra<span>Sys</span></div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1>Library <span>Dashboard</span></h1>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="spinner-container"><div class="spinner"></div></div>
    </div>

    <div class="admin-section">
      <h2>Quick Links</h2>
      <div class="admin-links">
        <a href="books.html" class="btn btn-primary">Browse Books</a>
        <a href="admin-books.html" class="btn btn-secondary">Manage Books</a>
        <a href="add-book.html" class="btn btn-secondary">Add New Book</a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 LibraSys. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async function () {
      try {
        const books = await apiFetch("/books");
        document.getElementById("statsGrid").innerHTML = `
          <div class="stat-card">
            <h3>Total Books</h3>
            <div class="stat-number">${books.length}</div>
          </div>
          <div class="stat-card">
            <h3>Available Copies</h3>
            <div class="stat-number">${books.reduce((sum, b) => sum + (b.copies || 0), 0)}</div>
          </div>
        `;
      } catch {
        document.getElementById("statsGrid").innerHTML = "<p style='color:var(--danger);'>Could not load data.</p>";
      }
    })();
  </script>
</body>
</html>
