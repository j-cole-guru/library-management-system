<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — LibraSys</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">Libra<span>Sys</span></div>
      <h2>Create Account</h2>
      <div id="registerMessage" class="message"></div>
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required>
          <div class="field-error" id="nameError">Name is required.</div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
          <div class="field-error" id="emailError">Please enter a valid email.</div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required>
          <div class="field-error" id="passwordError">Password must be at least 6 characters.</div>
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn">Register</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", handleRegister);
  </script>
</body>
</html>
