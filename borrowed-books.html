<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Books — LibraSys</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/books.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Libra<span>Sys</span></div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <div class="borrowed-page">
    <h1>My <span>Borrowed Books</span></h1>
    <div id="borrowedContainer" class="borrowed-list">
      <div class="spinner-container"><div class="spinner"></div></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 LibraSys. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("borrowedContainer").innerHTML =
        '<p style="text-align:center;color:var(--gray);">Borrowing feature is not available yet. Check back later.</p>';
    });
  </script>
</body>
</html>
